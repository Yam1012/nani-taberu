  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --primary: #FF6B35;
      --primary-dark: #E55A25;
      --text: #1c1c1e;
      --text-secondary: #8e8e93;
      --border: #c6c6c8;
      --separator: #e5e5ea;
      --blue: #007aff;
      --green: #34c759;
      --red: #ff3b30;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #000;
      color: var(--text);
      overflow: hidden;
    }

    #root {
      height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ── Nav bar ── */
    .nav-bar {
      background: rgba(249,249,249,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: calc(var(--safe-top) + 12px) 16px 10px;
      border-bottom: 0.5px solid var(--separator);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }
    .nav-title { font-size: 17px; font-weight: 600; text-align: center; flex: 1; }
    .nav-btn {
      font-size: 17px; color: var(--blue);
      background: none; border: none; cursor: pointer;
      padding: 4px 0; min-width: 60px; font-family: inherit;
    }
    .nav-btn.left { text-align: left; }
    .nav-btn.right { text-align: right; }

    /* ── Progress bar ── */
    .progress-bar { height: 3px; background: var(--separator); flex-shrink: 0; }
    .progress-fill { height: 100%; background: var(--primary); transition: width 0.35s ease; }

    /* ── Scroll area ── */
    .scroll-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--safe-bottom) + 30px);
    }

    /* ── Splash ── */
    .splash {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh;
      background: linear-gradient(160deg, #FF6B35 0%, #FF4500 60%, #D93A00 100%);
    }
    .splash-icon { font-size: 88px; animation: bob 2.4s ease-in-out infinite; }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .splash-title { font-size: 40px; font-weight: 900; color: #fff; margin: 16px 0 6px; letter-spacing: -1px; }
    .splash-sub { font-size: 16px; color: rgba(255,255,255,0.75); }

    /* ── Loading dots ── */
    .dots { display: flex; gap: 8px; margin-top: 28px; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: rgba(255,255,255,0.7);
      animation: pulse-dot 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse-dot {
      0%,80%,100%{transform:scale(0.5);opacity:0.4}

    .dot.dark { background: var(--primary); }

    /* ── Section ── */
    .section { margin: 20px 16px 0; }
    .section-header {
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 0 4px 6px;

    /* ── Card / list ── */
    .card { background: var(--card); border-radius: 12px; overflow: hidden; }

      border-bottom: 0.5px solid var(--separator);

    .list-row:last-child { border-bottom: none; }
    .list-row-label { font-size: 17px; flex: 1; }

    .tag:active { opacity: 0.7; }

    /* ── Toggle ── */

    .range {

      border-radius: 50%; background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25); cursor: pointer;

    .r-rank {

    .match-row { display: flex; align-items: center; gap: 8px; }

    .match-bar { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }

    .detail-hero { padding: calc(var(--safe-top) + 64px) 24px 28px; color: white; flex-shrink: 0; }
    .hero-back-btn {

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .info-item { background: white; border-radius: 12px; padding: 13px; }
    .info-lbl { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }

    .action-btn {

      gap: 8px; padding: 16px; border-radius: 14px;

    .action-btn:active { opacity: 0.8; }

    .btn-phone { background: var(--blue); color: white; }
    .btn-link { background: #f2f2f7; color: var(--text); }

      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);

      box-shadow: 0 4px 14px rgba(255,107,53,0.35);

    .center-layout {

      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;

    .center-icon { font-size: 72px; }
    .center-title { font-size: 22px; font-weight: 700; margin-top: 18px; }
    .center-sub { font-size: 15px; color: var(--text-secondary); margin-top: 8px; }

    .budget-pick {

    /* ── GPS ── */
    .gps-icon { font-size: 72px; animation: gps-pulse 1.8s ease-in-out infinite; }
    @keyframes gps-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

    /* ── Data source badge ── */
    .data-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
      padding: 3px 9px; border-radius: 8px;

    .data-badge.mock { background: #fff3e0; color: #e65100; }

       Settings Modal
    ══════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: flex-end;

      width: 100%; max-width: 430px; margin: 0 auto;

    .a2hs-banner {

  if (!VC_SID || !VC_HP_PID) return searchUrl;
  return `https://ck.jp.ap.valuecommerce.com/servlet/referral?sid=${VC_SID}&pid=${VC_HP_PID}&vc_url=${encodeURIComponent(searchUrl)}`;

// 生年月日から現在の年齢を計算（誕生日前なら-1）
function calcAge(birthday) {
  if (!birthday) return null;
  const today = new Date();
  const birth = new Date(birthday);
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
  return age;
}

function getPlaceType(types) {
  for (const t of (types || [])) {
    if (GP_TYPE_MAP[t]) return GP_TYPE_MAP[t];
  }
  return { label: '飲食店', emoji: '🍽️' };
}

const PRICE_LABELS = ['〜¥1,000', '¥1,000〜2,000', '¥2,000〜4,000', '¥4,000〜8,000', '¥8,000〜'];

// Vercel API 経由でGoogle Places検索（APIキーはサーバー側）
async function googlePlacesSearch({ lat, lng, keyword, radius = 1500 }) {
  const params = new URLSearchParams({ lat, lng, radius: String(radius) });
  if (keyword) params.set('keyword', keyword);
  const res = await fetch(`/api/search?${params}`);
  if (!res.ok) throw new Error(`サーバーエラー ${res.status}`);
  const data = await res.json();
  if (data.status === 'REQUEST_DENIED') throw new Error('APIキーが無効です');
  if (data.status === 'INVALID_REQUEST')  throw new Error('リクエストエラー');
  if (data.status === 'ZERO_RESULTS' || data.status === 'OK') return data.results || [];
  throw new Error(`Places API: ${data.status}`);
}

function surveyToKeyword(survey) {
  const parts = [];
  if (survey.wantAlcohol === true) parts.push('居酒屋');
  if (survey.foodCategory === 'meat') parts.push('焼肉');
  else if (survey.foodCategory === 'fish') parts.push('海鮮');
  else if (survey.foodCategory === 'vegetables') parts.push('野菜');
  if (survey.temperature === 'cold') parts.push('鍋');
  if (survey.meatType === 'chicken') parts.push('鶏');
  if (survey.fishType === 'sashimi') parts.push('刺身');
  return parts.length ? parts.join(' ') : '居酒屋';
}

function mapGooglePlace(place, idx) {
  const { label, emoji } = getPlaceType(place.types);
  const tags = [label];
  if (place.rating) {
    const cnt = place.user_ratings_total;
    tags.push(`★${place.rating.toFixed(1)}${cnt ? ` (${cnt.toLocaleString()}件)` : ''}`);
  }
  if (place.price_level != null) tags.push(PRICE_LABELS[place.price_level] || '');
  if (place.opening_hours?.open_now === true)  tags.push('🟢 営業中');
  else if (place.opening_hours?.open_now === false) tags.push('🔴 準備中');
  return {
    id: place.place_id,
    name: place.name,
    type: label,
    emoji,
    address: place.vicinity || '',
    phone: null,
    priceRange: place.price_level != null ? PRICE_LABELS[place.price_level] : '価格情報なし',
    rating: place.rating,
    ratingCount: place.user_ratings_total,
    tags: tags.filter(Boolean).slice(0, 5),
    comment: place.vicinity || `${place.name}でお食事を。`,
    gradColors: GRAD_POOL[idx % GRAD_POOL.length],
    isRealData: true,
    shopUrl: `https://www.google.com/maps/place/?q=place_id:${place.place_id}`,
    hotpepperSearchUrl: `https://www.hotpepper.jp/CSP/pf/search/?kwd=${encodeURIComponent(place.name)}`,
    placeId: place.place_id,
  };
}

function scoreGooglePlace(place, survey, profile) {
  let s = { tumamiMatch: 65, sakeMatch: 65, atmosphere: 70, cost: 70, overall: 70 };

  // Googleレーティングボーナス
  const rating = place.rating || 3.5;
  if      (rating >= 4.5) { s.overall += 18; s.atmosphere += 10; }
  else if (rating >= 4.2) { s.overall += 12; s.atmosphere += 7; }
  else if (rating >= 4.0) { s.overall += 8;  s.atmosphere += 5; }
  else if (rating >= 3.8) { s.overall += 4; }
  else if (rating <  3.0) { s.overall -= 10; }

  // 口コミ数（人気度）
  const cnt = place.user_ratings_total || 0;
  if (cnt > 500) s.atmosphere += 7;
  else if (cnt > 100) s.atmosphere += 4;

  // 営業中ボーナス
  if (place.opening_hours?.open_now === true) s.overall += 5;

  // 価格帯 vs 予算
  const priceLevel = place.price_level ?? 2;
  const priceBreaks = [1000, 2000, 4000, 8000, 15000];
  const estimated = priceBreaks[Math.min(priceLevel, 4)];
  if      (survey.budget >= estimated)            s.cost = 90;
  else if (survey.budget >= estimated * 0.75)     s.cost = 75;
  else if (survey.budget <  estimated * 0.5)      s.cost = 48;

  // 店名・タイプから内容推定
  const name  = (place.name || '').toLowerCase();
  const types = place.types || [];
  if (survey.wantAlcohol === true) {
    if (types.includes('bar') || types.includes('night_club')) s.sakeMatch += 20;
    if (/居酒屋|酒場|izakaya|バー/.test(name)) s.sakeMatch += 14;
    if (/ビア|beer|ブルワリー/.test(name)) { s.sakeMatch += 8; if (profile.favDrink === 'beer') s.sakeMatch += 6; }
  }
  if (survey.foodCategory === 'meat') {
    if (/焼肉|ステーキ|肉|bbq|yakiniku/.test(name)) s.tumamiMatch += 18;
    if (survey.meatType === 'chicken' && /鶏|チキン|やきとり/.test(name)) s.tumamiMatch += 12;
  }
  if (survey.foodCategory === 'fish') {
    if (types.includes('sushi_restaurant') || types.includes('seafood_restaurant')) s.tumamiMatch += 18;
    if (/寿司|海鮮|魚|刺身|sushi/.test(name)) s.tumamiMatch += 14;
  }
  if (survey.foodCategory === 'anything') s.tumamiMatch += 8;

  // プロフィール嗜好
  if (profile.favDrink === 'sake' && /日本酒|酒蔵/.test(name)) s.sakeMatch += 10;
  if (profile.favDrink === 'wine' && /ワイン|wine/.test(name)) s.sakeMatch += 10;
  if (profile.favDrink === 'beer' && /ビール|beer|craft|クラフト/.test(name)) s.sakeMatch += 10;

  Object.keys(s).forEach(k => { s[k] = Math.min(97, Math.max(45, s[k])); });
  s.total = Math.round((s.tumamiMatch + s.sakeMatch + s.atmosphere + s.cost + s.overall) / 5);
  return s;
}

// ── Mock scoring ──
function scoreMock(restaurant, survey, profile) {
  const s = { ...restaurant.baseScores };
  const b = restaurant.boosts;
  const add = (f, d) => { s[f] = Math.min(100, s[f] + d); };

  if (survey.wantAlcohol === true) { add('sakeMatch', b.drinkYes || 0); add('overall', 3); }
  if (survey.wantFood === 'lots') add('tumamiMatch', b.foodLots || 0);
  if (survey.foodCategory === 'meat') { add('tumamiMatch', b.meat || 0); if (survey.meatType === 'chicken') add('tumamiMatch', b.chicken || 0); }
  if (survey.foodCategory === 'fish') { add('tumamiMatch', b.fish || 0); if (survey.fishType === 'sashimi') add('tumamiMatch', b.sashimi || 0); }
  if (survey.foodCategory === 'vegetables') add('tumamiMatch', b.vegetables || 0);
  if (profile.favDrink === 'sake') add('sakeMatch', b.sake || 0);
  if (profile.favDrink === 'shochu') add('sakeMatch', b.shochu || 0);
  if (profile.favDrink === 'beer' || profile.beerBrand) add('sakeMatch', b.beer || 0);
  if (profile.beerBrand === 'craft') add('sakeMatch', b.craft || 0);

  const m = parseInt(restaurant.priceRange.replace(/[^0-9]/g,'').slice(0,4));
  if (survey.budget >= m) add('cost', 10);

  s.total = Math.round((s.tumamiMatch + s.sakeMatch + s.atmosphere + s.cost + s.overall) / 5);
  return s;
}

function Toggle({ checked, onChange }) {
  return (
    <label className="toggle-wrap" style={{cursor:'pointer'}}>
      <input type="checkbox" checked={checked} onChange={e => onChange(e.target.checked)}
        style={{opacity:0,width:0,height:0,position:'absolute'}} />
      <div style={{
        position:'absolute',inset:0,background:checked?'#34c759':'#ddd',
        borderRadius:16,transition:'background .3s'
      }}/>
      <div style={{
        position:'absolute',width:27,height:27,background:'white',borderRadius:'50%',
        top:2,left:2,transition:'transform .3s',transform:checked?'translateX(20px)':'none',
        boxShadow:'0 2px 6px rgba(0,0,0,0.25)'
      }}/>
    </label>
  );
}

function Tags({ options, value, onChange, multi = false }) {
  const isOn = v => multi ? (value||[]).includes(v) : value === v;
  const toggle = v => {
    if (multi) {
      const arr = value || [];
      onChange(arr.includes(v) ? arr.filter(x=>x!==v) : [...arr,v]);
    } else {
      onChange(isOn(v) ? null : v);
    }
  };
  return (
    <div className="tag-group">
      {options.map(o => (
        <button key={String(o.value)} className={`tag ${isOn(o.value)?'on':''}`}
          onClick={() => toggle(o.value)}>{o.label}</button>
      ))}
    </div>
  );
}

function StarsDisplay({ score }) {
  const n = Math.round(score / 20);
  return (
    <div className="stars-row">
      {[1,2,3,4,5].map(i => (
        <span key={i} className="star" style={{color:i<=n?'#FFB800':'#ddd'}}>★</span>
      ))}
    </div>
  );
}

function RadarChart({ scores }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current.getContext('2d'), {
      type: 'radar',
      data: {
        labels: ['つまみ\nマッチ','酒\nマッチ','雰囲気','コスパ','おすすめ\n度'],
        datasets: [{
          data: [scores.tumamiMatch, scores.sakeMatch, scores.atmosphere, scores.cost, scores.overall],
          backgroundColor: 'rgba(255,107,53,0.18)',
          borderColor: '#FF6B35', borderWidth: 2.5,
          pointBackgroundColor: '#FF6B35', pointRadius: 5,
          pointBorderColor: 'white', pointBorderWidth: 2,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        scales: {
          r: {
            min: 0, max: 100,
            ticks: { stepSize: 25, display: false },
            grid: { color: 'rgba(0,0,0,0.07)' },
            angleLines: { color: 'rgba(0,0,0,0.07)' },
            pointLabels: { font: { size: 11, weight: '600' }, color: '#444' },
          },
        },
        plugins: { legend: { display: false } },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [scores.tumamiMatch, scores.sakeMatch, scores.atmosphere, scores.cost, scores.overall]);
  return <div className="chart-wrap"><canvas ref={ref}/></div>;
}

function GPSScreen({ onDone, onBack }) {
  const [phase, setPhase] = useState('detecting'); // 'detecting' | 'confirm'
  const [detectedPos, setDetectedPos] = useState(null); // {lat,lng} or null
  const [overridePos, setOverridePos] = useState(null); // 手動選択した都市
  const [errMsg, setErrMsg] = useState('');
  const [showCityPicker, setShowCityPicker] = useState(false);

  useEffect(() => {
    const onSuccess = geo => {
      setDetectedPos({ lat: geo.coords.latitude, lng: geo.coords.longitude });
      setPhase('confirm');
    };
    const onFail = err => {
      if (err?.code === 1) setErrMsg('位置情報の許可が拒否されています');
      else if (err?.code === 2) setErrMsg('位置情報を取得できませんでした');
      else if (err?.code === 3) setErrMsg('タイムアウト — 東京エリアで代替します');
      else setErrMsg('位置情報を取得できませんでした');
      setPhase('confirm');
    };
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(onSuccess, onFail, {timeout:8000, enableHighAccuracy:true});
    } else {
      setErrMsg('このブラウザはGPSに対応していません');
      setPhase('confirm');
    }
  }, []);

  // 使用する座標（手動選択 > GPS検出 > 東京フォールバック）
  const activePos = overridePos || detectedPos;
  const activeLat = activePos?.lat ?? 35.6594;
  const activeLng = activePos?.lng ?? 139.7005;

  const confirmLocation = () => {
    onDone({ lat: activeLat, lng: activeLng, isFallback: !activePos, label: overridePos?.label });
  };

  const mapUrl = `https://www.google.com/maps?q=${activeLat},${activeLng}&z=16`;

  if (phase === 'detecting') {
    return (
      <div className="screen">
        <div className="nav-bar">
          {onBack
            ? <button className="nav-btn left" onClick={onBack}>‹ 戻る</button>
            : <span style={{minWidth:60}}/>}
          <span className="nav-title">現在地の確認</span>
          <span style={{minWidth:60}}/>
        </div>
        <div className="center-layout">
          <div className="gps-icon">📍</div>
          <div className="center-title">現在地を取得中...</div>
          <div className="center-sub">ブラウザの位置情報許可をONにしてください</div>
          <div className="dots" style={{marginTop:24}}>
            <div className="dot dark"/><div className="dot dark"/><div className="dot dark"/>
          </div>
        </div>
      </div>
    );
  }

  // Confirm phase
  return (
    <div className="screen">
      <div className="nav-bar">
        {onBack
          ? <button className="nav-btn left" onClick={onBack}>‹ 戻る</button>
          : <span style={{minWidth:60}}/>}
        <span className="nav-title">現在地の確認</span>
        <span style={{minWidth:60}}/>
      </div>
      <div className="scroll-content">
        <div style={{padding:'28px 24px 0', textAlign:'center'}}>
          <div style={{fontSize:52}}>{overridePos ? '🏙️' : detectedPos ? '📍' : '⚠️'}</div>
          <div className="center-title" style={{marginTop:10}}>
            {overridePos ? overridePos.label : detectedPos ? '現在地を取得しました' : '位置情報が使えません'}
          </div>
          {errMsg && !overridePos && (
            <div style={{marginTop:8,fontSize:13,color:'var(--red)'}}>{errMsg}</div>
          )}
        </div>

        {/* 座標カード（GPS or 手動選択） */}
        <div style={{margin:'16px 16px 0', background:'white', borderRadius:14, padding:16}}>
          <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:6}}>
            {overridePos ? '🏙️ 選択エリア' : detectedPos ? '📍 検出された座標' : '⚠️ 代替座標（東京・渋谷）'}
          </div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:12,color:'var(--text)'}}>
            {activeLat.toFixed(4)}, {activeLng.toFixed(4)}
          </div>
          <a href={mapUrl} target="_blank" rel="noopener noreferrer" style={{textDecoration:'none'}}>
            <button className="action-btn btn-map" style={{fontSize:15,padding:'12px'}}>
              🗺️ Google マップで確認する
            </button>
          </a>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:8,textAlign:'center'}}>
            ピンがズレている場合は「場所を変更する」で修正できます
          </div>
        </div>

        <div style={{padding:'16px 16px 24px', display:'flex', flexDirection:'column', gap:10}}>
          <button className="btn-primary" onClick={confirmLocation}>
            ✅ この場所で探す
          </button>
          <button style={{
            width:'100%', padding:'14px', borderRadius:14,
            background:'white', border:'1.5px solid var(--primary)',
            fontSize:16, fontWeight:700, color:'var(--primary)',
            cursor:'pointer', fontFamily:'inherit'
          }} onClick={() => setShowCityPicker(true)}>
            📍 場所を変更する
          </button>
        </div>
      </div>

      {showCityPicker && (
        <CityPickerModal
          onSelect={c => { setOverridePos(c); setShowCityPicker(false); }}
          onClose={() => setShowCityPicker(false)}
        />
      )}
    </div>
  );
}

function SurveyScreen({ profile, onDone, onBack }) {
  const [step, setStep] = useState(0);
  const [sv, setSv] = useState({
    wantAlcohol: null, wantFood: null, temperature: null,
    foodCategory: null, meatType: null, fishType: null, vegType: null,
    budget: 3000,
  });
  const upd = (k, v) => setSv(prev => ({...prev, [k]: v}));

  const buildSteps = () => {
    const list = [
      {
        title: '今日の気分は？',
        ok: () => sv.wantAlcohol !== null && sv.wantFood !== null && sv.temperature !== null,
        body: (<>
          <div className="q-card">
            <div className="q-title">🍶 お酒飲みたい？</div>
            <Tags options={[{label:'🍺 飲みたい！',value:true},{label:'🫗 今日はいいかな',value:false}]}
              value={sv.wantAlcohol} onChange={v => upd('wantAlcohol', v)}/>
          </div>
          <div className="q-card">
            <div className="q-title">🍚 ごはんは？</div>
            <Tags options={[{label:'🍖 がっつり食べたい',value:'lots'},{label:'🥜 つまみ程度でOK',value:'light'}]}
              value={sv.wantFood} onChange={v => upd('wantFood', v)}/>
          </div>
          <div className="q-card">
            <div className="q-title">🌡️ 今日の気候は？</div>
            <Tags options={[{label:'❄️ 寒い',value:'cold'},{label:'🌤️ ちょうどいい',value:'nice'},{label:'☀️ 暑い',value:'hot'}]}
              value={sv.temperature} onChange={v => upd('temperature', v)}/>
          </div>
        </>),
      },
      {
        title: '何が食べたい？',
        ok: () => sv.foodCategory !== null,
        body: (
          <div className="q-card">
            <div className="q-title">何が食べたい気分？</div>
            <Tags options={[
              {label:'🥩 お肉',value:'meat'},{label:'🐟 お魚',value:'fish'},
              {label:'🥗 野菜',value:'vegetables'},{label:'🍜 なんでもOK',value:'anything'},
            ]} value={sv.foodCategory} onChange={v => upd('foodCategory', v)}/>
          </div>
        ),
      },
    ];

    if (sv.foodCategory === 'meat') {
      list.push({
        title: 'どのお肉？', ok: () => sv.meatType !== null,
        body: (
          <div className="q-card">
            <div className="q-title">🥩 どのお肉が食べたい？</div>
            <Tags options={[
              {label:'🐄 牛肉',value:'beef'},{label:'🐷 豚肉',value:'pork'},
              {label:'🐔 鶏肉',value:'chicken'},{label:'🐑 羊肉',value:'lamb'},
              {label:'🦌 ジビエ',value:'game'},
            ]} value={sv.meatType} onChange={v => upd('meatType', v)}/>
          </div>
        ),
      });
    } else if (sv.foodCategory === 'fish') {
      list.push({
        title: 'お魚の食べ方は？', ok: () => sv.fishType !== null,
        body: (
          <div className="q-card">
            <div className="q-title">🐟 どんな魚料理？</div>
            <Tags options={[
              {label:'🍣 お刺身',value:'sashimi'},{label:'🔥 焼き魚',value:'grilled'},
              {label:'🍲 煮魚',value:'simmered'},
            ]} value={sv.fishType} onChange={v => upd('fishType', v)}/>
          </div>
        ),
      });
    } else if (sv.foodCategory === 'vegetables') {
      list.push({
        title: '野菜の食べ方は？', ok: () => sv.vegType !== null,
        body: (
          <div className="q-card">
            <div className="q-title">🥗 どんな野菜料理？</div>
            <Tags options={[
              {label:'🥗 サラダ',value:'salad'},{label:'🥘 煮物',value:'simmered'},
              {label:'🍲 お鍋',value:'hotpot'},
            ]} value={sv.vegType} onChange={v => upd('vegType', v)}/>
          </div>
        ),
      });
    }

    list.push({
      title: '予算は？', ok: () => true,
      body: (
        <div className="q-card">
          <div className="q-title">💰 一人あたりの予算</div>
          <div style={{textAlign:'center',marginBottom:18}}>
            <span style={{fontSize:40,fontWeight:900,color:'var(--primary)'}}>
              ¥{sv.budget.toLocaleString()}
            </span>
          </div>
          <input type="range" className="range"
            min={1000} max={10000} step={500} value={sv.budget}
            onChange={e => upd('budget', parseInt(e.target.value))}
            style={{background:`linear-gradient(to right,var(--primary) 0%,var(--primary) ${((sv.budget-1000)/9000)*100}%,#e5e5ea ${((sv.budget-1000)/9000)*100}%,#e5e5ea 100%)`}}
          />
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--text-secondary)',marginTop:4}}>
            <span>¥1,000</span><span>¥10,000</span>
          </div>
          <div className="budget-picks">
            {[2000,3000,5000,8000].map(v => (
              <button key={v} className={`budget-pick ${sv.budget===v?'on':''}`}
                onClick={() => upd('budget', v)}>¥{v/1000}K</button>
            ))}
          </div>
        </div>
      ),
    });

    return list;
  };

  const steps = buildSteps();
  const ss = Math.min(step, steps.length - 1);
  const cur = steps[ss];

  return (
    <div className="screen">
      <div className="nav-bar">
        <button className="nav-btn left"
          onClick={() => ss > 0 ? setStep(ss - 1) : onBack && onBack()}>
          ‹ 戻る
        </button>
        <span className="nav-title">{cur.title}</span>
        <span style={{minWidth:60,textAlign:'right',fontSize:13,color:'var(--text-secondary)'}}>
          {ss+1}/{steps.length}
        </span>
      </div>
      <div className="progress-bar">
        <div className="progress-fill" style={{width:`${((ss+1)/steps.length)*100}%`}}/>
      </div>
      <div className="scroll-content">
        <div style={{height:4}}/>{cur.body}
        <div style={{padding:'24px 16px'}}>
          <button className="btn-primary" disabled={!cur.ok()}
            onClick={() => ss < steps.length-1 ? setStep(ss+1) : onDone(sv)}>
            {ss < steps.length-1 ? '次へ →' : '🔍 お店を探す！'}
          </button>
        </div>
      </div>
    </div>
  );
}

          <div className="score-bars">
            {scoreItems.map(item => (
              <div key={item.label} className="score-item">
                <div className="score-lbl">
                  <span>{item.icon}</span><span>{item.label}</span>
                  <span style={{marginLeft:'auto',fontSize:12,fontWeight:700,color:'var(--primary)'}}>{item.val}</span>
                </div>
                <div className="score-bar-bg">
                  <div className="score-bar-fill" style={{width:`${item.val}%`}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Comment */}
        <div style={{marginTop:16}}>
          <div className="section-title">コメント</div>
          <div className="comment-box">{r.comment}</div>
        </div>

        {/* Tags */}
        <div style={{marginTop:16}}>
          <div className="section-title">特徴・こだわり</div>
          <div className="tag-group" style={{marginTop:8}}>
            {r.tags.map(t => (
              <span key={t} className="tag" style={{cursor:'default',fontSize:14,padding:'6px 14px'}}>{t}</span>
            ))}
          </div>
        </div>

        {/* Actions */}
        <div style={{display:'flex',flexDirection:'column',gap:12,marginTop:24}}>
          <a href={mapUrl} target="_blank" rel="noopener noreferrer" style={{textDecoration:'none'}}>
            <button className="action-btn btn-map">🗺️ ここに行く（地図を開く）</button>
          </a>
          {r.phone && (
            <a href={`tel:${r.phone}`} style={{textDecoration:'none'}}>
              <button className="action-btn btn-phone">📞 電話で予約</button>
            </a>
          )}
          {r.hotpepperSearchUrl && (
            <a href={buildHotpepperAffiliateUrl(r.hotpepperSearchUrl)} target="_blank" rel="noopener noreferrer" style={{textDecoration:'none'}}>
              <button className="action-btn btn-reserve">
                📝 ホットペッパーで予約を探す
                {(VC_SID && VC_HP_PID) && <span style={{fontSize:10,opacity:0.75,marginLeft:6,fontWeight:400}}>PR</span>}
              </button>
            </a>
          )}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
//  AD BANNER（ValueCommerce / Yahoo!ショッピング）
// ══════════════════════════════════════════
function AdBanner({ slotId }) {
  const configured = Boolean(VC_SID && VC_YS_PID);

  useEffect(() => {
    if (!configured) return;
    const el = document.getElementById(slotId);
    if (!el || el.childElementCount > 0) return; // 2重挿入防止
    const s1 = document.createElement('script');
    s1.type = 'text/javascript';
    s1.text = 'vc_rptn=5;';
    el.appendChild(s1);
    const s2 = document.createElement('script');
    s2.type = 'text/javascript';
    s2.src = `https://ad.jp.ap.valuecommerce.com/servlet/jsbanner?sid=${VC_SID}&pid=${VC_YS_PID}`;
    el.appendChild(s2);
    return () => { if (el) el.innerHTML = ''; };
  }, [slotId, configured]);

  if (!configured) {
    return (
      <div className="ad-wrap">
        <div className="ad-placeholder">
          <span className="ad-label">AD</span>
          <span>バリューコマース承認後に自動表示</span>
        </div>
      </div>
    );
  }
  return (
    <div className="ad-wrap">
      <div className="ad-live-header">
        <span className="ad-live-label">広告</span>
      </div>
      <div id={slotId} className="ad-live"/>
    </div>
  );
}

// ══════════════════════════════════════════
//  ADD TO HOME SCREEN BANNER
// ══════════════════════════════════════════
function AddToHomeBanner({ isIOS, deferredPrompt, onClose }) {
  const handleInstall = async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        localStorage.setItem('nani_a2hs', 'installed');
      }
    }
    onClose('later');
  };

  return (
    <div className="a2hs-banner">
      <div className="a2hs-row">
        <div className="a2hs-icon-wrap">🍽️</div>
        <div className="a2hs-label">
          <div className="a2hs-label-title">ホーム画面に追加</div>
          <div className="a2hs-label-sub">
            {isIOS
              ? <>Safari の <strong>共有ボタン ⬆</strong> →「ホーム画面に追加」</>
              : 'アプリのようにすぐ起動できます'}
          </div>
        </div>
        {!isIOS && deferredPrompt && (
          <button className="a2hs-add-btn" onClick={handleInstall}>追加</button>
        )}
      </div>
      <div className="a2hs-footer">
        <button className="a2hs-later-btn" onClick={() => onClose('later')}>後で</button>
        <button className="a2hs-never-btn" onClick={() => onClose('never')}>表示しない</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
//  ROOT APP
// ══════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState('splash');
  const [profile, setProfile] = useState(null);
  const [location, setLocation] = useState(null);
  const [survey, setSurvey] = useState(null);
  const [results, setResults] = useState([]);       // 全取得結果（最大20件）
  const [displayCount, setDisplayCount] = useState(3); // 表示件数
  const [isRealData, setIsRealData] = useState(false);
  const [apiError, setApiError] = useState('');
  const [selected, setSelected] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [searchMsg, setSearchMsg] = useState('周辺のお店を検索中...');
  const [showA2HS, setShowA2HS] = useState(false);
  const [isIOSDevice, setIsIOSDevice] = useState(false);
  const deferredInstall = useRef(null);
  const a2hsInit = useRef(false);

  useEffect(() => {
    const savedProfile = localStorage.getItem('nani_taberu_v1');
    if (savedProfile) setProfile(JSON.parse(savedProfile));
  }, []);

  // ── 検索（Google Places API via Vercel）──
  useEffect(() => {
    if (screen !== 'searching') return;
    const start = Date.now();
    setDisplayCount(3);

    const doSearch = async () => {
      const msgs = ['周辺のお店を検索中...','口コミ・評価を確認中...','おすすめを選んでいます...'];
      let mi = 0;
      const iv = setInterval(() => { mi=(mi+1)%msgs.length; setSearchMsg(msgs[mi]); }, 800);

      let shopList = [];
      let real = false;
      let apiErrorDetail = '';

      try {
        if (!location) throw new Error('位置情報がありません');

        const keyword = surveyToKeyword(survey || {});
        const base = { lat: location.lat, lng: location.lng };

        // 段階的拡大検索（全国対応）
        const tryStep = async (params, label) => {
          setSearchMsg(label);
          try { return await googlePlacesSearch(params); }
          catch (e) { console.warn('Step failed:', e.message); return []; }
        };

        let raw = await tryStep({ ...base, keyword, radius: 1500 }, `「${keyword}」で検索中（1.5km）...`);
        if (raw.length === 0)
          raw = await tryStep({ ...base, keyword, radius: 3000 }, `範囲を3kmに拡大中...`);
        if (raw.length === 0)
          raw = await tryStep({ ...base, keyword: '居酒屋', radius: 3000 }, `飲食店を広域検索中...`);
        if (raw.length === 0)
          raw = await tryStep({ ...base, radius: 3000 }, `周辺の全飲食店を検索中...`);

        if (raw.length > 0) {
          shopList = raw.map((p, i) => ({
            ...mapGooglePlace(p, i),
            _scores: scoreGooglePlace(p, survey || {}, profile || {}),
          })).sort((a, b) => b._scores.total - a._scores.total);
          real = true;
        } else {
          apiErrorDetail = '3km圏内に飲食店が見つかりませんでした';
        }
      } catch (e) {
        console.warn('Search error:', e.message);
        apiErrorDetail = e.message.includes('サーバーエラー')
          ? 'サービスが一時的に利用できません。しばらくお待ちください'
          : `検索エラー: ${e.message}`;
      }

      clearInterval(iv);

      if (shopList.length === 0) {
        shopList = MOCK_RESTAURANTS.map(r => ({
          ...r,
          _scores: scoreMock(r, survey || {}, profile || {}),
        })).sort((a, b) => b._scores.total - a._scores.total);
        real = false;
      }

      const elapsed = Date.now() - start;
      setTimeout(() => {
        setResults(shopList);
        setIsRealData(real);
        setApiError(apiErrorDetail);
        setScreen('results');
      }, Math.max(0, 1600 - elapsed));
    };

    doSearch();
  }, [screen]);

  // ── A2HS: show when leaving splash for the first time ──
  useEffect(() => {
    if (screen === 'splash' || a2hsInit.current) return;
    const pref = localStorage.getItem('nani_a2hs');
    if (pref === 'never' || pref === 'installed') return;
    // Already running as standalone PWA
    if (window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true) {
      localStorage.setItem('nani_a2hs', 'installed');
      return;
    }
    a2hsInit.current = true;
    const ua = navigator.userAgent;
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    const isSafariOnIOS = isIOS && !/CriOS|FxiOS|OPiOS/.test(ua);
    setIsIOSDevice(isIOS);

    let timer;
    // Android/Chrome: wait for native install prompt
    const onInstallable = (e) => {
      e.preventDefault();
      deferredInstall.current = e;
      timer = setTimeout(() => setShowA2HS(true), 2000);
    };
    window.addEventListener('beforeinstallprompt', onInstallable);

    // iOS Safari: show manual guide
    if (isSafariOnIOS) {
      timer = setTimeout(() => setShowA2HS(true), 2000);
    }

    return () => {
      clearTimeout(timer);
      window.removeEventListener('beforeinstallprompt', onInstallable);
    };
  }, [screen]);

  const handleA2HSClose = (action) => {
    if (action === 'never') localStorage.setItem('nani_a2hs', 'never');
    setShowA2HS(false);
  };

  const handleEditProfile = () => {
    setShowSettings(false);
    localStorage.removeItem('nani_taberu_v1');
    setProfile(null);
    setSurvey(null);
    setLocation(null);
    setScreen('profile');
  };

  return (
    <>
      {screen === 'splash'    && <SplashScreen onDone={() => {
        setScreen(localStorage.getItem('nani_taberu_v1') ? 'gps' : 'profile');
      }}/>}
      {screen === 'profile'   && <ProfileSetup onDone={p => {
        localStorage.setItem('nani_taberu_v1', JSON.stringify(p));
        setProfile(p);
        setScreen('gps');
      }}/>}
      {screen === 'gps'    && <GPSScreen
          onDone={loc => { setLocation(loc); setScreen('survey'); }}
          onBack={() => setScreen('profile')}
        />}
      {screen === 'survey' && <SurveyScreen
          profile={profile}
          onDone={sv => { setSurvey(sv); setScreen('searching'); }}
          onBack={() => setScreen('gps')}
        />}
      {screen === 'searching' && <SearchingScreen msg={searchMsg}/>}
      {screen === 'results'   && (
        <ResultsScreen
          results={results.slice(0, displayCount)}
          totalFetched={results.length}
          canLoadMore={displayCount < results.length}
          onLoadMore={() => setDisplayCount(prev => Math.min(prev + 3, results.length))}
          isRealData={isRealData}
          apiError={apiError}
          onSelect={r => { setSelected(r); setScreen('detail'); }}
          onRetry={() => { setSurvey(null); setScreen('survey'); }}
          onSettings={() => setShowSettings(true)}
        />
      )}
      {screen === 'detail' && selected && (
        <DetailScreen restaurant={selected} onBack={() => setScreen('results')}/>
      )}

      {showSettings && (
        <SettingsModal
          onClose={() => setShowSettings(false)}
          onEditProfile={handleEditProfile}
        />
      )}
      {showA2HS && (
        <AddToHomeBanner
          isIOS={isIOSDevice}
          deferredPrompt={deferredInstall.current}
          onClose={handleA2HSClose}
        />
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>

</body>
